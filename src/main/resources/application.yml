logging:
  level:
    root: INFO
    org:
      springframework:
        security: INFO
        jdbc:
          core:
            JdbcTemplate: INFO
            StatementCreatorUtils: INFO
        transaction: INFO
        web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    url: /swagger.yml


spring:
  web:
    resources:
      static-locations: "classpath:/META-INF/resources/webjars/,classpath:/static/"
  mvc:
    static-path-pattern: /webjars/**,/resources/**,/static/**

