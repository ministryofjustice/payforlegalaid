logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:default}
        version: ${spring.application.version:default}
        environment: ${spring.profiles.active:default}
        node_name: ${HOSTNAME:unknown}
  level:
    root: ${ROOT_LOGGING_LEVEL:INFO}
    org:
      springframework:
        security: ${SPRING_LOGGING_LEVEL:INFO}
        jdbc:
          core:
            JdbcTemplate: ${SPRING_LOGGING_LEVEL:INFO}
            StatementCreatorUtils: ${SPRING_LOGGING_LEVEL:INFO}
        transaction: ${SPRING_LOGGING_LEVEL:INFO}
        web: ${SPRING_LOGGING_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    url: /swagger.yml

spring:
  application:
    name: Pay For Legal Aid
    version: @project.version@
  mvc:
    async:
      request-timeout: 3600000
  flyway:
    schemas: glad
    create-schemas: true
    locations: classpath:flyway/migration/schema
    url: ${gpfd.datasource.tracking.jdbcUrl}
    user: ${gpfd.datasource.tracking.username}
    password: ${gpfd.datasource.tracking.password}

gpfd:
  s3:
    # If this is true, the environment will need to be deployed with appropriate config and permission for accessing an S3 bucket.
    has-s3-access: false
  csv-generation:
    buffer-flush-frequency: 5000

  datasource:
    tracking:
      # Default connection details for local dev, overridden in other envs
      driver-class-name: org.postgresql.Driver
      jdbcUrl: jdbc:postgresql://${RDS_DB_HOST:localhost}:5432/${RDS_DB_NAME:glad}
      username: ${TRACKING_DB_USERNAME:user}
      password: ${TRACKING_DB_PASSWORD:dev}

  security:
    cors:
      allowed-origin: https://127.0.0.1:8080