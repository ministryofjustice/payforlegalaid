logging:
  level:
    root: INFO
    org:
      springframework:
        security: INFO
        jdbc:
          core:
            JdbcTemplate: INFO
            StatementCreatorUtils: INFO
        transaction: INFO
        web.client.RestTemplate: INFO


gpfd:
  url: http://localhost:8080
  redirect-uri-template: ${gpfd.url}/login/oauth2/code/gpfd-azure-dev
  security:
    cors:
      allowed-origin: http://localhost:8080

  datasource:
    read-only:
      url: jdbc:oracle:thin:@oracle-local:1521/FREEPDB1
      username: GPFD
      password: ${ORACLE_DB_PASSWORD}
      driver-class-name: oracle.jdbc.OracleDriver
    write:
      url: jdbc:oracle:thin:@oracle-local:1521/FREEPDB1
      username: GPFD
      password: ${ORACLE_DB_PASSWORD}
      driver-class-name: oracle.jdbc.OracleDriver

spring:
  config:
    activate:
      on-profile: local
  security:
    oauth2:
      client:
        registration:
          gpfd-azure-dev:
            client-id: test
            client-secret: test
            scope: openid, profile, email
            redirect-uri:  ${gpfd.redirect-uri-template}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic

        provider:
          gpfd-azure-dev:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:oracle:thin:@oracle-local:1521/FREEPDB1
    username: GPFD
    password: ${ORACLE_DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: GPFD
    url: jdbc:oracle:thin:@oracle-local:1521/FREEPDB1
    user: GPFD
    password: ${ORACLE_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: none
    generate-ddl: false