logging:
  level:
    root: INFO
    org:
      springframework:
        security: INFO
        jdbc:
          core:
            JdbcTemplate: INFO
            StatementCreatorUtils: INFO
        transaction: INFO
        web.client.RestTemplate: INFO

gpfd:
  url: http://localhost:8080
  redirect-uri-template: ${gpfd.url}/login/oauth2/code/gpfd-azure-dev

  datasource:
    read-only:
      url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver
    write:
      url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver

spring:
  config:
    activate:
      on-profile: local
  security:
    oauth2:
      client:
        registration:
          gpfd-azure-dev:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri:  ${gpfd.redirect-uri-template}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic

        provider:
          gpfd-azure-dev:
            issuer-uri: https://login.microsoftonline.com/${TENANT_ID}/v2.0

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: GPFD
    url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS GPFD
    user: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: none
    generate-ddl: false