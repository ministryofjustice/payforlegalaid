logging:
  level:
    root: INFO
    org:
      springframework:
        security: INFO
        jdbc:
          core:
            JdbcTemplate: INFO
            StatementCreatorUtils: INFO
        transaction: INFO
        web.client.RestTemplate: INFO


gpfd:
  url: http://localhost:8080
  redirect-uri-template: ${gpfd.url}/login/oauth2/code/gpfd-azure-dev

  datasource:
    read-only:
      url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver
    write:
      url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
      username: sa
      password:
      driver-class-name: org.h2.Driver

spring:
  cloud:
    azure:
      active-directory:
        enabled: false
        # Stubbed azure content is not used but needed for it to compile right now
        profile:
          tenant-id: AZURE_TENANT_ID
        credential:
          client-id: AZURE_CLIENT_ID
          client-secret: AZURE_CLIENT_SECRET
        redirect-uri-template: ${gpfd.redirect-uri-template}
        authorization-clients:
          graph:
            scopes:
              - https://graph.microsoft.com/User.Read

  datasource:
    url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: GPFD
    url: jdbc:h2:file:/data/localGpfdDb;MODE=Oracle;DATABASE_TO_UPPER=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS GPFD
    user: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: none
    generate-ddl: false