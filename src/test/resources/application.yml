gpfd:
  url: https://localhost:8080
  datasource:
    read-only:
      jdbc-url: jdbc:h2:file:~/localGpfdDb;MODE=Oracle
      username: sa
      password:
      driver-class-name: org.h2.Driver
    write:
      jdbc-url: jdbc:h2:file:~/localGpfdDb;MODE=Oracle
      username: sa
      password:
      driver-class-name: org.h2.Driver
  jwks-uri: https://sts.windows.net/${spring.cloud.azure.active-directory.profile.tenant-id}/
  s3:
    # If this is true, the environment will need to be deployed with appropriate config and permission for accessing an S3 bucket.
    use-template-store: false


spring:
  main:
    allow-bean-definition-overriding: true
  liquibase:
    enabled: true
    changelog: /db/changelog/db.changelog-master.xml
  security:
    oauth2:
      client:
        registration:
          gpfd-azure-dev:
            client-id: test
            client-secret: test
            scope: openid, profile, email
            redirect-uri: http://localhost
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
            provider: gpfd-azure-dev
        provider:
          gpfd-azure-dev:
            authorization-uri: http://localhost/oauth2/authorize
            token-uri: http://localhost/oauth2/token
            user-info-uri: http://localhost/userinfo
            jwk-set-uri: http://localhost/oauth2/jwks

springdoc:
  api-docs:
    enabled: false