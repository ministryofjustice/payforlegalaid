services:
  oracle:
    image: gvenzl/oracle-free:23-slim@sha256:8f9a8225cc43d28f5b61e4b961734d3d798d4c2f058bed3f21498c03adee6141
    container_name: oracle-local
    environment:
      ORACLE_PASSWORD: ${ORACLE_DB_PASSWORD}
      ORACLE_DB_PASSWORD: ${ORACLE_DB_PASSWORD}
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./local/oracle-init:/container-entrypoint-initdb.d
    mem_limit: 2g
    shm_size: 1g
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1521"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  payforlegalaid:
    build:
      context: .
      dockerfile: ./local/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: payforlegalaid-local
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ORACLE_DB_PASSWORD: ${ORACLE_DB_PASSWORD}
    depends_on:
      oracle:
        condition: service_healthy        # wait for Oracle to be ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  oracle-data: