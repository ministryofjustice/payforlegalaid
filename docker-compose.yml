services:
  payforlegalaid:
    build:
      context: .
      dockerfile: ./local/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: payforlegalaid-local
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    volumes:
      - gpfd-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

volumes:
  gpfd-data: