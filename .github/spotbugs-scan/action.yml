name: SpotBugs Security Scan
description: Run SpotBugs/FindSecBugs security analysis and upload SARIF to GitHub Code Scanning

runs:
  using: 'composite'
  steps:
    - name: Run SpotBugs security scan and generate SARIF report
      run: |
        echo "Running SpotBugs security analysis..."
        mvn -B -Pfindsecbugs -DskipTests clean compile spotbugs:spotbugs \
          -Dspotbugs.sarifOutput=true \
          -Dspotbugs.excludeFilterFile=spotbugs-exclude.xml
      shell: bash

    - name: Upload SpotBugs results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      if: always()
      with:
        sarif_file: target/spotbugsSarif.json
        category: spotbugs

