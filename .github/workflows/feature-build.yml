name: Feature build and test
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  feature_branch:
    environment: acceptance-tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed so AWS can login in the acceptance test action
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test
        uses: './.github/build-and-test'
        with:
          github-username: ${{ secrets.GITHUB_USERNAME }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          SOCKET_KEY: ${{ secrets.DEV_API_SOCKET_KEY }}

