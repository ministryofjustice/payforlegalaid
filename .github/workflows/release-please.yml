name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - uses: googleapis/release-please-action@3b5c1f8a1c2d4e9a0f8b7c6d5e4f3a2b1c0d9e8f #v4.4.1
        with:
          release-type: maven