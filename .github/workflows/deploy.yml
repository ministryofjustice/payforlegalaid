name: One to deploy them all

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: >-
          For feature branches / ad-hoc deploys (merges to main do not auto-deploy except release-please).
          dev — development only.
          dev-uat — development then UAT (UAT requires approval).
          uat — UAT only (does not deploy dev first).
          all — development, UAT, then prod.
        type: choice
        required: true
        default: dev
        options:
          - dev
          - dev-uat
          - uat
          - all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_check:
    name: Determine deployment path
    runs-on: ubuntu-latest
    outputs:
      is_release_merge: ${{ steps.check.outputs.is_release_merge }}

    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          is_release=false

          if [[ "$EVENT_NAME" == "push" ]]; then
            msg="$COMMIT_MSG"

            if [[ "$msg" =~ ^chore(\([^)]+\))?:\ release\ [0-9] ]]; then
              is_release=true
            fi
          fi

          echo "is_release_merge=$is_release" >> "$GITHUB_OUTPUT"

      - name: Deployment summary
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_SCOPE: ${{ inputs.deploy_scope }}
          IS_RELEASE: ${{ steps.check.outputs.is_release_merge }}
        run: |
          echo "## Deployment Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "- Event: $EVENT_NAME" >> $GITHUB_STEP_SUMMARY

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "- Scope: $DEPLOY_SCOPE" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- Release merge: $IS_RELEASE" >> $GITHUB_STEP_SUMMARY

  To_Dev:
    name: Deploy to dev
    needs: release_check
    if: >-
      github.event_name == 'push'
      || inputs.deploy_scope == 'dev'
      || inputs.deploy_scope == 'dev-uat'
      || inputs.deploy_scope == 'all'
    uses: ./.github/workflows/deploy_api_to_env.yml
    with:
      github_environment: development
      environment_name: dev
      ingress_url: dev-laa-get-payments-finance-data.cloud-platform.service.justice.gov.uk
      alert_severity: laa-get-legal-aid-data-dev
      secret_name: gpfd-test-secret-01
    secrets:
      api_socket_key: ${{ secrets.DEV_API_SOCKET_KEY }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      socket_key: ${{ secrets.DEV_SOCKET_KEY }}
      ecr_role_to_assume: ${{ secrets.DEV_ECR_ROLE_TO_ASSUME }}
      kube_namespace: ${{ secrets.KUBE_NAMESPACE_DEV }}
      kube_cluster: ${{ secrets.KUBE_CLUSTER_DEV }}
      kube_token: ${{ secrets.KUBE_TOKEN_DEV }}
      kube_cert: ${{ secrets.KUBE_CERT_DEV }}

  To_Uat:
    name: Deploy to UAT
    needs: [release_check, To_Dev]
    if: >-
      always()
      && (needs.To_Dev.result == 'success' || needs.To_Dev.result == 'skipped')
      && ((github.event_name == 'push' && needs.release_check.outputs.is_release_merge == 'true')
        || inputs.deploy_scope == 'uat'
        || inputs.deploy_scope == 'dev-uat'
        || inputs.deploy_scope == 'all')
    uses: ./.github/workflows/deploy_api_to_env.yml
    with:
      github_environment: uat
      environment_name: uat
      ingress_url: uat-laa-get-payments-finance-data.cloud-platform.service.justice.gov.uk
      alert_severity: laa-get-legal-aid-data-uat
      secret_name: gpfd-uat-secret-01
    secrets:
      api_socket_key: ${{ secrets.UAT_API_SOCKET_KEY }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      socket_key: ${{ secrets.UAT_SOCKET_KEY }}
      ecr_role_to_assume: ${{ secrets.UAT_ECR_ROLE_TO_ASSUME }}
      kube_namespace: ${{ secrets.KUBE_NAMESPACE_UAT }}
      kube_cluster: ${{ secrets.KUBE_CLUSTER_UAT }}
      kube_token: ${{ secrets.KUBE_TOKEN_UAT }}
      kube_cert: ${{ secrets.KUBE_CERT_UAT }}

  To_Prod:
    name: Deploy to prod
    needs: [release_check, To_Uat]
    if: >-
      always()
      && needs.To_Uat.result == 'success'
      && ((github.event_name == 'push' && needs.release_check.outputs.is_release_merge == 'true')
        || inputs.deploy_scope == 'all')
    uses: ./.github/workflows/deploy_api_to_env.yml
    with:
      github_environment: prod
      environment_name: prod
      ingress_url: get-legal-aid-data.service.justice.gov.uk
      alert_severity: laa-get-legal-aid-data-prod
      secret_name: gpfd-prod-secret-01
    secrets:
      api_socket_key: ${{ secrets.PROD_API_SOCKET_KEY }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}
      socket_key: ${{ secrets.PROD_SOCKET_KEY }}
      ecr_role_to_assume: ${{ secrets.PROD_ECR_ROLE_TO_ASSUME }}
      kube_namespace: ${{ secrets.KUBE_NAMESPACE_PROD }}
      kube_cluster: ${{ secrets.KUBE_CLUSTER_PROD }}
      kube_token: ${{ secrets.KUBE_TOKEN_PROD }}
      kube_cert: ${{ secrets.KUBE_CERT_PROD }}