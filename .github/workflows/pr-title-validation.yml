name: PR Title Validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title format
        run: |
          echo "Checking PR title: ${{ github.event.pull_request.title }}"

          echo "${{ github.event.pull_request.title }}" | grep -Eq '^(feat|fix|docs|chore|refactor|test|ci|build|perf)(\([A-Z]+-[0-9]+\))?: .+' \
            || (echo "❌ Invalid PR title format" && exit 1)