name: OWASP ZAP UAT Scan

on:
  workflow_dispatch:
  pull_request:

  schedule:
    # Every weekday at 2am UTC
    - cron: '0 2 * * 1-5'

jobs:
  zap_scan:
    name: Run OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    continue-on-error: true

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'https://uat-laa-get-payments-finance-data.cloud-platform.service.justice.gov.uk/'
          cmd_options: >-
            -a
            -z "-config authentication.enabled=true"
            -z "-config authentication.method=form"
            -z "-config authentication.form.username=${{ secrets.ZAP_USERNAME }}"
            -z "-config authentication.form.password=${{ secrets.ZAP_PASSWORD }}"
            -z "-config authentication.form.login_url=https://login.microsoftonline.com/ff260a8b-cb92-4cfe-8ae9-d48bb0fd9851/oauth2/v2.0/authorize"
            -z "-config authentication.form.username_field=email"
            -z "-config authentication.form.password_field=password"

      # Example external upload placeholder
      - name: Upload report to external storage
        if: always()
        run: |
          echo "Upload report_html.html to approved storage location"