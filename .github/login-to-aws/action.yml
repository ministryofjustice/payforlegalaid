name: Login to AWS

runs:
  using: 'composite'

  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Assume role in Cloud Platform
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ env.ROLE }}
        aws-region: ${{ env.AWS_REGION }}
