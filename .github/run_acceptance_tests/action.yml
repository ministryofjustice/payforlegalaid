name: Build and test

runs:
  using: 'composite'

  steps:
    - name: Checkout GitHub repository
      uses: actions/checkout@v4
      with:
        repository: ministryofjustice/payforlegalaid-tests
        ref: faeture/test-foo
        path: testCode

    - name: Build source code
      run: |
        echo "GOT THE TESTS CODE"
      shell:
        bash

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'corretto'
        java-version: '17'

    - name: Checkout source code repo
      uses: actions/checkout@v4
      with:
        path: sourceCode

    - name: Build source code
      run: |
        cd sourceCode
        mvn -B -DskipTests clean install -DskipTests -s .github/settings.xml
      shell:
        bash

    - name: Run tests
      run: |
        cd testCode
        mvn -B clean package  -DskipTests -s .github/settings.xml
      shell:
        bash

    - name: Build source code
      run: |
        echo "BUILDING DOCKER AT'S IMAGE"
        echo "Current directory contents:"
        ls -la
      shell: bash

    - name: Build docker-test
      run: |
        cd testCode
        export DOCKER_BUILDKIT=1
        
        echo "Verifying secrets:"
        echo "USERNAME: ${USERNAME:0:1}...[redacted]...${USERNAME: -1}"
        echo "PASSWORD: ${PASSWORD:0:1}...[redacted]...${PASSWORD: -1}"
    
        docker build \
        --secret id=maven_username,env=USERNAME \
        --secret id=maven_password,env=PASSWORD \
        -t $REGISTRY/$REPOSITORY:gpfd-tests36-new-$IMAGE_TAG .
        docker push $REGISTRY/$REPOSITORY:gpfd-tests36-new-$IMAGE_TAG
      shell: bash
      env:
        USERNAME: ${{ env.USERNAME }}
        PASSWORD: ${{ env.PASSWORD }}
        REGISTRY: ${{ env.REGISTRY }}
        REPOSITORY: ${{ env.REPOSITORY }}
        IMAGE_TAG: ${{ env.IMAGE_TAG }}

    - name: Build source code
      run: |
        echo "CREATED DOCKER IMAGE"
        echo "Final directory contents:"
        cd testCode
        ls -la
        cd helm
        ls -la
        helm upgrade --install gpfd-test tests  --namespace "laa-get-payments-finance-data-dev" --debug
      shell: bash